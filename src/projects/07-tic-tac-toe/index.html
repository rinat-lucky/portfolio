<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крестики-Нолики</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/7c061e793d.js"></script>
</head>
<body>
   
    <!-- Выбор сторон -->
    <div class="select-box">
        <header>Крестики-Нолики</header>
        <div class="content">
            <div class="title">Выбери свою сторону</div>
            <div class="options">
                <button class="playerX">Игрок (X)</button>
                <button class="playerO">Игрок (O)</button>    
            </div>
        </div>
    </div>

    <!-- Игровая доска -->
    <div class="playboard">
        <div class="details">
            <div class="players">
                <span class="Xturn">Ход (X)</span>
                <span class="Oturn">Ход (O)</span>
                <div class="slider"></div>
            </div>
        </div>

        <div class="playarea">
            <section>
                <span class="box1"></span>
                <span class="box2"></span>
                <span class="box3"></span>
            </section>
    
            <section>
                <span class="box4"></span>
                <span class="box5"></span>
                <span class="box6"></span>
            </section>
    
            <section>
                <span class="box7"></span>
                <span class="box8"></span>
                <span class="box9"></span>
            </section>
        </div>
    </div>

    <!-- Результат игры -->
    <div class="result-box">
        <div class="win-text"></div>
        <div class="btn">
            <button>Повторить игру</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
