<!DOCTYPE html>
<html lang="en">
<head>

    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Сайт-портфолио начинающего веб-разработчика из Екатеринбурга (https://github.com/rinat-lucky)">
    <title>Портфолио | Ринат Камалитдинов</title>
    <link href="css/style.min.css" rel="stylesheet">

<body style="font-family: 'Montserrat', sans-serif;">
    
    <div class="container-fluid min-vh-100 bg-primary bg-gradient">
        <div class="container py-5">
            <h1 class="text-white text-center fw-bold mb-5 display-4">Портфолио</h1>

            <div class="nav nav-pills justify-content-center mx-1 " id="v-pills-tab" role="tablist">
                <button class="nav-link text-white fs-2 col-4 rounded-0 active" id="v-pills-js-tab" data-bs-toggle="pill" data-bs-target="#v-pills-js" type="button" role="tab" aria-selected="true">Мини-проекты JS</button>
                <button class="nav-link text-white fs-2 col-4 rounded-0" id="v-pills-html-tab" data-bs-toggle="pill" data-bs-target="#v-pills-html" type="button" role="tab" aria-selected="false">Верстка сайтов</button>
                <button class="nav-link text-white fs-2 col-4 rounded-0" id="v-pills-frameworks-tab" data-bs-toggle="pill" data-bs-target="#v-pills-frameworks" type="button" role="tab" aria-selected="false">Фреймворки</button>
            </div>

            <div class="tab-content" id="v-pills-tabContent">
                <div class="tab-pane fade show active" id="v-pills-js" role="tabpanel" aria-labelledby="v-pills-js-tab">
                    <div class="container pt-5">
                        <div id="js-wrapper" class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 justify-content-center justify-content-sm-between">
                            <!-- Карточки формируются динамически -->
                        </div>
                    </div>
                </div>

                <div class="tab-pane fade show" id="v-pills-html" role="tabpanel" aria-labelledby="v-pills-html-tab">
                    <div class="container pt-5">
                        <div id="html-wrapper" class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 justify-content-center justify-content-sm-between">
                            <!-- Карточки формируются динамически -->
                        </div>
                    </div>
                </div>

                <div class="tab-pane text-white fade" id="v-pills-frameworks" role="tabpanel" aria-labelledby="v-pills-frameworks-tab">
                    <div class="container pt-5">

                        <!-- Удалить эту строку при появлении проектов -->
                        <div class="display-6 pt-5">Скоро здесь будут крутые проекты</div>

                        <div id="frameworks-wrapper" class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 justify-content-center justify-content-sm-between">
                            <!-- Карточки формируются динамически -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

    <script src="js/bootstrap.min.js" integrity="sha384-skAcpIdS7UcVUC05LJ9Dxay8AXcDYfBJqt1CJ85S/CFujBsIzCIv+l9liuYLaMQ/" crossorigin="anonymous"></script>
